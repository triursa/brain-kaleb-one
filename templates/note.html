<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} — brain.kaleb.one</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Georgia&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #09090b;
  --bg-gradient: linear-gradient(135deg, #09090b 0%, #1a1a2e 50%, #09090b 100%);
  --surface: rgba(255,255,255,0.06);
  --surface-hover: rgba(255,255,255,0.1);
  --border: rgba(255,255,255,0.1);
  --border-hover: rgba(255,255,255,0.2);
  --text: #fafafa;
  --text-secondary: #a1a1aa;
  --text-muted: #71717a;
  --accent: #60a5fa;
  --accent-glow: rgba(96,165,250,0.15);
  --domain-color: {{DOMAIN_COLOR}};
  --font-ui: 'Inter', -apple-system, sans-serif;
  --font-serif: 'Georgia', serif;
  --radius: 16px;
  --radius-sm: 10px;
  --blur: blur(20px);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { font-family: var(--font-ui); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
.bg-ambient { position: fixed; inset: 0; z-index: -1; background: var(--bg-gradient); }
.bg-ambient::before {
  content: ''; position: absolute; top: -30%; left: -15%; width: 50%; height: 50%;
  background: radial-gradient(ellipse, {{DOMAIN_COLOR}}18 0%, transparent 70%);
  animation: f1 20s ease-in-out infinite;
}
@keyframes f1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(3%,5%)} }
.app { max-width: 860px; margin: 0 auto; padding: 24px; }
.topbar {
  display: flex; align-items: center; gap: 8px;
  padding: 16px 24px; margin-bottom: 32px;
  background: var(--surface); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px;
}
.topbar a { color: var(--text-secondary); text-decoration: none; transition: color 0.15s; }
.topbar a:hover { color: var(--accent); }
.topbar .sep { color: var(--text-muted); margin: 0 4px; }
.topbar .current { color: var(--text); font-weight: 500; }

.note-content {
  background: var(--surface); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 40px; border-top: 2px solid var(--domain-color);
}
.note-content h1 {
  font-family: var(--font-serif); font-size: 28px; font-weight: 700;
  margin-bottom: 8px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
}
.note-content h2 { font-size: 20px; font-weight: 600; margin: 28px 0 12px; color: var(--text); }
.note-content h3 { font-size: 17px; font-weight: 600; margin: 24px 0 10px; color: var(--text-secondary); }
.note-content h4 { font-size: 15px; font-weight: 600; margin: 20px 0 8px; color: var(--text-muted); }
.note-content p { margin-bottom: 12px; color: var(--text-secondary); line-height: 1.7; }
.note-content ul { margin: 12px 0; padding-left: 20px; color: var(--text-secondary); }
.note-content li { margin-bottom: 6px; line-height: 1.6; }
.note-content .check-item { list-style: none; display: flex; align-items: center; gap: 8px; }
.note-content .check-item input { accent-color: var(--accent); }
.note-content strong { color: var(--text); font-weight: 600; }
.note-content em { font-style: italic; color: var(--text-secondary); }
.note-content a { color: var(--accent); text-decoration: none; }
.note-content a:hover { text-decoration: underline; }
.note-content .wikilink {
  color: var(--accent); background: var(--accent-glow);
  padding: 1px 6px; border-radius: 4px; text-decoration: none; font-weight: 500;
}
.note-content .wikilink:hover { text-decoration: none; background: var(--accent); color: var(--bg); }
.note-content table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 14px; }
.note-content th {
  text-align: left; padding: 10px 14px; background: var(--surface);
  border-bottom: 1px solid var(--border); color: var(--text); font-weight: 500;
}
.note-content td { padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--text-secondary); }
.note-content tr:hover td { background: var(--surface); }
.note-content hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
.note-content blockquote {
  border-left: 3px solid var(--accent); padding: 8px 16px; margin: 12px 0;
  color: var(--text-muted); font-style: italic;
}

.meta-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.meta-tag { font-size: 11px; padding: 2px 8px; border-radius: 6px; background: rgba(255,255,255,0.05); color: var(--text-muted); }
.meta-status { font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 500; }
.meta-status.active { background: rgba(34,197,94,0.15); color: #22c55e; }
.meta-status.loop { background: rgba(234,179,8,0.15); color: #eab308; }
.meta-status.paused { background: rgba(113,113,122,0.15); color: #71717a; }

.footer { text-align: center; padding: 40px 0 20px; color: var(--text-muted); font-size: 12px; }

@media (max-width: 768px) {
  .app { padding: 16px; }
  .note-content { padding: 20px; }
}
</style>
</head>
<body>
<div class="bg-ambient"></div>
<div class="app">
  <nav class="topbar">
    <a href="/">🧠 brain</a>
    <span class="sep">→</span>
    <a href="/domains/{{DOMAIN_KEY}}.html">{{ICON}} {{LABEL}}</a>
    <span class="sep">→</span>
    <span class="current">{{TITLE}}</span>
  </nav>
  <article class="note-content">
    <h1>{{TITLE}}</h1>
    <div class="meta-row">{{META}}</div>
    {{BODY}}
  </article>
  <div class="footer">
    brain.kaleb.one — <a href="/" style="color:var(--accent);text-decoration:none;">Mission Control</a>
     · <a href="/domains/{{DOMAIN_KEY}}.html" style="color:var(--accent);text-decoration:none;">{{LABEL}}</a>
  </div>
</div>
</body>
</html>
