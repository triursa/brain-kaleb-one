<!DOCTYPE html>
<html lang="en" data-theme="obsidian" data-domain="brain">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#11151C">
<title>brain.kaleb.one — Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://theme.kaleb.one/dist/theme-obsidian.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Georgia&display=swap" rel="stylesheet">
<style>
:root {
:root {
  /* M3 Obsidian base tokens from theme-obsidian.css */
  --md-sys-color-primary: #60a5fa;
  --md-sys-color-on-primary: #1a1a1d;
  --md-sys-color-primary-container: rgba(96,165,250,0.15);

  /* Semantic/signal colors (NOT theme tokens — preserved) */
  --accent: #60a5fa;
  --accent-glow: rgba(96,165,250,0.15);

  /* Shorthand aliases for M3 tokens (used throughout styles) */
  --bg: var(--md-sys-color-surface);
  --bg-gradient: linear-gradient(135deg, var(--md-sys-color-surface) 0%, #1a1a2e 50%, var(--md-sys-color-surface) 100%);
  --surface: var(--md-sys-color-surface-container-low);
  --surface-hover: var(--md-sys-color-surface-container);
  --border: var(--md-sys-color-outline-variant);
  --border-hover: var(--md-sys-color-outline);
  --text: var(--md-sys-color-on-surface);
  --text-secondary: var(--md-sys-color-on-surface-variant);
  --text-muted: var(--md-sys-color-outline);
  --radius: var(--md-sys-shape-corner-large);
  --radius-sm: var(--md-sys-shape-corner-medium);
  --font-ui: 'Inter', -apple-system, sans-serif;
  --font-serif: 'Georgia', serif;
  --mono: 'JetBrains Mono', 'DM Mono', monospace;
}
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  overflow-x: hidden;
}
.bg-ambient {
  position: fixed; inset: 0; z-index: -1;
  background: var(--bg-gradient);
}
.bg-ambient::before {
  content: ''; position: absolute;
  top: -50%; left: -25%; width: 75%; height: 75%;
  background: radial-gradient(ellipse, rgba(96,165,250,0.08) 0%, transparent 70%);
  animation: float1 20s ease-in-out infinite;
}
.bg-ambient::after {
  content: ''; position: absolute;
  bottom: -30%; right: -20%; width: 60%; height: 60%;
  background: radial-gradient(ellipse, rgba(139,92,246,0.06) 0%, transparent 70%);
  animation: float2 25s ease-in-out infinite;
}
@keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(5%,10%)} }
@keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-5%,-8%)} }

.app { max-width: 1280px; margin: 0 auto; padding: 24px; }

/* Top nav */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px; margin-bottom: 32px;
  background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.topbar-logo {
  font-size: 24px; font-weight: 700;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.topbar-subtitle { color: var(--text-muted); font-size: 13px; }
.topbar-right { display: flex; gap: 8px; }
.topbar-btn {
  padding: 8px 16px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text-secondary); font-size: 13px; cursor: pointer;
  transition: all 0.2s; text-decoration: none; font-family: var(--font-ui);
}
.topbar-btn:hover { background: var(--surface-hover); color: var(--text); border-color: var(--border-hover); }
.topbar-btn.active { background: var(--accent-glow); color: var(--accent); border-color: var(--accent); }

/* Search */
.search-wrap { position: relative; margin-bottom: 32px; }
.search-input {
  width: 100%; padding: 14px 20px 14px 48px;
  background: var(--surface);   border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text); font-size: 15px; font-family: var(--font-ui); outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text-muted); }
.search-icon {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); font-size: 18px; pointer-events: none;
}
.search-results {
  position: absolute; top: 100%; left: 0; right: 0;
  background: var(--md-sys-color-surface-container-high);   border: 1px solid var(--border); border-radius: 0 0 var(--radius) var(--radius);
  max-height: 400px; overflow-y: auto; display: none; z-index: 100;
}
.search-results.visible { display: block; }
.search-result {
  padding: 12px 20px; display: flex; align-items: center; gap: 12px;
  cursor: pointer; transition: background 0.15s; text-decoration: none; color: var(--text);
}
.search-result:hover { background: var(--surface-hover); }
.search-result .result-domain { color: var(--text-muted); font-size: 12px; }
.search-result .result-title { font-size: 14px; font-weight: 500; }

/* Section headings */
.section-title {
  font-size: 20px; font-weight: 600; margin-bottom: 20px;
  display: flex; align-items: center; gap: 10px; color: var(--text);
}
.section-title::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* Stat cards row */
.stats-row {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px; margin-bottom: 40px;
}
.stat-card {
  background: var(--surface);   border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px; text-align: center; transition: border-color 0.2s;
}
.stat-card:hover { border-color: var(--border-hover); }
.stat-value { font-size: 32px; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

/* Glass cards */
.glass-card {
  background: var(--surface);   border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px; transition: all 0.25s; position: relative; overflow: hidden;
}
.glass-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--domain-color, var(--accent)), transparent);
  opacity: 0; transition: opacity 0.25s;
}
.glass-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
.glass-card:hover::before { opacity: 1; }

/* Domain cards grid */
.domain-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px; margin-bottom: 40px;
}

.card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.card-icon { font-size: 24px; }
.card-header h3 { flex: 1; font-size: 16px; font-weight: 600; color: var(--text); }
.badge {
  background: var(--accent-glow); color: var(--accent);
  font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px;
}
.card-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }
.card-links { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.note-link {
  font-size: 12px; color: var(--text-secondary); background: rgba(255,255,255,0.04);
  padding: 4px 10px; border-radius: 6px; text-decoration: none; transition: all 0.15s;
}
.note-link:hover { background: var(--surface-hover); color: var(--text); }
.more-link { font-style: italic; }
.card-launch {
  display: inline-block; font-size: 13px; font-weight: 500; color: var(--accent);
  text-decoration: none; transition: all 0.2s;
}
.card-launch:hover { color: var(--text); }

/* App cards (graduated domains) */
.app-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px; margin-bottom: 40px;
}
.app-card .card-launch {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; background: var(--accent-glow);
  border-radius: var(--radius-sm); margin-top: 8px;
}
.app-card .card-launch:hover { background: var(--accent); color: var(--bg); }

/* Status pip */
.status-pip { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.status-pip.live {
  background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,0.4);
  animation: pulse 3s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* Open loops panel */
.loops-panel { margin-bottom: 40px; }
.loop-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px;
}
.loop-item:last-child { border-bottom: none; }
.loop-icon { font-size: 18px; }
.loop-item a { color: var(--text-secondary); text-decoration: none; transition: color 0.15s; }
.loop-item a:hover { color: var(--accent); }

/* Insights panel */
.insights-panel { margin-bottom: 40px; }
.insight-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  margin-bottom: 8px; font-size: 14px; color: var(--text-secondary);
}
.insight-icon { font-size: 18px; flex-shrink: 0; }

.empty-state { color: var(--text-muted); font-style: italic; font-size: 14px; }

/* Footer */
.footer {
  text-align: center; padding: 40px 0 20px; color: var(--text-muted); font-size: 12px;
}

@media (max-width: 768px) {
  .app { padding: 16px; }
  .domain-grid { grid-template-columns: 1fr; }
  .app-grid { grid-template-columns: repeat(2, 1fr); }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
